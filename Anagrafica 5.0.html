<!DOCTYPE html>
<html>
<body>
<h1>Anagrafica 5.0 - Inserimento</h1>

Nome: <input type="text" id="nome"><br>
Cognome: <input type="text" id="cognome"><br>
Età: <input type="text" id="eta"><br>
CAP: <input type="text" id="cap"><br>
Email: <input type="text" id="email"><br>
Colore occhi: <input type="text" id="occhi"><br><br>

<button onclick="salva()">Aggiungi</button>

<script>
function salva() {

  const nome = document.getElementById("nome").value;
  const cognome = document.getElementById("cognome").value;
  const eta = document.getElementById("eta").value;
  const cap = document.getElementById("cap").value;
  const email = document.getElementById("email").value;
  const occhi = document.getElementById("occhi").value;

  // REGEX
  const regNome = /^[A-Za-z]+$/;
  const regCap = /^[0-9]+$/;
  const regEmail = /^[^\s@]+@[^\s@]+\.[A-Za-z]{2,6}$/;

  if (!regNome.test(nome)) {
    alert("Nome valido solo con lettere");
    return;
  }

  if (!regNome.test(cognome)) {
    alert("Cognome valido solo con lettere");
    return;
  }

  if (!regCap.test(cap)) {
    alert("CAP valido solo con numeri");
    return;
  }

  if (!regEmail.test(email)) {
    alert("Email non valida");
    return;
  }

  let elenco = localStorage.getItem("elenco");
  elenco = elenco ? JSON.parse(elenco) : [];

  const persona = { nome, cognome, eta, cap, email, occhi };

  elenco.push(persona);

  localStorage.setItem("elenco", JSON.stringify(elenco));

  alert("Persona salvata!");
}
</script>
</body>
</html>
